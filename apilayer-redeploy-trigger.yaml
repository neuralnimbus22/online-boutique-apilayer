apiVersion: tests.testkube.io/v1
kind: TestTrigger
metadata:
  name: apilayer-redeploy-trigger
  namespace: local-laptop
spec:
  resource: deployment
  resourceSelector:
    namespace: local-laptop
    labelSelector:
      matchLabels:
        app: apilayer
  event: modified
  action: run
  execution: testworkflow
  testSelector:
    name: apilayer-postman-tests
    namespace: local-laptop
